# ==========================================
# CONFIGURACIÓN DEL SERVIDOR ms-auth
# ==========================================
server.port=8081
spring.application.name=ms-auth

# ==========================================
# CONFIGURACIÓN DE BASE DE DATOS (MySQL)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/db_hotel_auth
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.cloud.compatibility-verifier.enabled=false
# Habilitar Flyway
spring.flyway.enabled=true
# Esto permite que Flyway cree las tablas si la base de datos está vacía, o valide si ya existen
spring.flyway.baseline-on-migrate=true