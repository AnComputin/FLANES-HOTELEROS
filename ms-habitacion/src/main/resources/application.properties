# ==========================================
# CONFIGURACI”N DEL SERVIDOR ms-habitacion
# ==========================================
server.port=8082
spring.application.name=ms-habitacion

# ==========================================
# CONFIGURACI”N DE BASE DE DATOS (MySQL)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/db_hotel_habitacion
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# CONFIGURACI”N DE JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
ms.reserva.url=http://localhost:8083
# Habilitar Flyway
spring.flyway.enabled=true
# Esto permite que Flyway cree las tablas si la base de datos est· vacÌa, o valide si ya existen
spring.flyway.baseline-on-migrate=true