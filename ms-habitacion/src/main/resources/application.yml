server:
  port: 8082

spring:
  application:
    name: ms-habitacion

  datasource:
    url: jdbc:mysql://localhost:3306/db_hotel_habitacion
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true

# Tu variable personalizada
ms:
  reserva:
    url: http://localhost:8083

springdoc:
  show-hateoas: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

