# 1. IdentificaciÃ³n del microservicio
spring.application.name=ms-reserva
server.port=8083

# 2. ConfiguraciÃ³n de la Base de Datos (Ejemplo MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/db_hotel_reserva?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=flan
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# 3. CONFIGURACIÃ“N DE JPA / HIBERNATE & FLYWAY
# ==========================================
spring.jpa.show-sql=true

#proteger la estructura
spring.jpa.hibernate.ddl-auto=validate

# Activamos Flyway Baseline para que reconozca que la tabla ya existe en MySQL
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.web.error.include-message=always
# Conexión secundaria de emergencia para guardar la factura directo
spring.datasource.facturacion.url=jdbc:mysql://localhost:3306/db_hotel_facturacion?useSSL=false&serverTimezone=UTC

