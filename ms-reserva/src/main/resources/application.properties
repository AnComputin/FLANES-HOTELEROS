# 1. Identificación del microservicio
spring.application.name=ms-reserva
# El puerto donde correrá (ej. 8081 para que no choque con ms-habitacion)
server.port=8081

# 2. Configuración de la Base de Datos (Ejemplo MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/db_hotel_reserva?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=holaflan
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# 3. CONFIGURACIÓN DE JPA / HIBERNATE & FLYWAY
# ==========================================
spring.jpa.show-sql=true

#proteger la estructura
spring.jpa.hibernate.ddl-auto=validate

# Activamos Flyway Baseline para que reconozca que la tabla ya existe en MySQL
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

