server:
  port: 8080 # El puerto principal del hotel

spring:
  application:
    name: ms-gateway
  cloud:
    gateway:
      routes:
        # Ruta para tu ms_auth
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/usuarios/**

        # Ruta para tu ms_habitacion
        - id: habitacion-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/habitaciones/**

        # Ruta para el ms_reserva (El de Anaís)
        - id: reserva-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/reservas/**

        # Ruta para el ms_facturacion (El de Anaís)
        - id: facturacion-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/facturacion/**