# ==========================================
# 1. IDENTIFICACIÓN DEL MICROSERVICIO
# ==========================================
spring.application.name=ms-facturacion
server.port=8083

# ==========================================
# 2. CONFIGURACIÓN DE LA BASE DE DATOS (MySQL)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/db_hotel_facturacion?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=holaflan
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# 3. CONFIGURACIÓN DE JPA / HIBERNATE & FLYWAY
# ==========================================
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.repair-on-migrate=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1