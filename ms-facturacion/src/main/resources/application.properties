# ==========================================
# 1. IDENTIFICACIÓN DEL MICROSERVICIO
# ==========================================
spring.application.name=ms-facturacion
# Usamos el puerto 8082 para que NO choque con el 8081 de ms-reserva
server.port=8084

# ==========================================
# 2. CONFIGURACIÓN DE LA BASE DE DATOS (MySQL)
# ==========================================
# Apuntamos a la base de datos db_hotel_facturacion
spring.datasource.url=jdbc:mysql://localhost:3306/db_hotel_facturacion?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=flan
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# 3. CONFIGURACIÓN DE JPA / HIBERNATE & FLYWAY
# ==========================================
spring.jpa.show-sql=true
# 'validate' obliga a usar los archivos SQL de Flyway
spring.jpa.hibernate.ddl-auto=update